<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">Tile Shift preview</title>
  <desc id="desc">A target tile board and a live tile board with shift controls.</desc>
  <rect width="320" height="200" rx="28" fill="#3b0764"/>
  <g transform="translate(30 54)" fill="#faf5ff" font-family="monospace" font-size="18" text-anchor="middle">
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#7e22ce"/><text x="16" y="22">▲</text>
    <rect x="38" y="0" width="32" height="32" rx="8" fill="#7e22ce"/><text x="54" y="22">■</text>
    <rect x="76" y="0" width="32" height="32" rx="8" fill="#7e22ce"/><text x="92" y="22">●</text>
    <rect x="0" y="38" width="32" height="32" rx="8" fill="#7e22ce"/><text x="16" y="60">◆</text>
    <rect x="38" y="38" width="32" height="32" rx="8" fill="#7e22ce"/><text x="54" y="60">✦</text>
    <rect x="76" y="38" width="32" height="32" rx="8" fill="#7e22ce"/><text x="92" y="60">★</text>
  </g>
  <g transform="translate(176 28)" fill="#faf5ff" font-family="monospace" font-size="16" text-anchor="middle">
    <rect x="0" y="0" width="32" height="24" rx="8" fill="#a855f7"/><text x="16" y="17">↓</text>
    <rect x="38" y="0" width="32" height="24" rx="8" fill="#a855f7"/><text x="54" y="17">↓</text>
    <rect x="76" y="0" width="32" height="24" rx="8" fill="#a855f7"/><text x="92" y="17">↓</text>
  </g>
  <g transform="translate(176 54)" fill="#faf5ff" font-family="monospace" font-size="18" text-anchor="middle">
    <rect x="-30" y="0" width="24" height="32" rx="8" fill="#a855f7"/><text x="-18" y="22">→</text>
    <rect x="-30" y="38" width="24" height="32" rx="8" fill="#a855f7"/><text x="-18" y="60">→</text>
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#9333ea"/><text x="16" y="22">■</text>
    <rect x="38" y="0" width="32" height="32" rx="8" fill="#9333ea"/><text x="54" y="22">●</text>
    <rect x="76" y="0" width="32" height="32" rx="8" fill="#9333ea"/><text x="92" y="22">▲</text>
    <rect x="0" y="38" width="32" height="32" rx="8" fill="#9333ea"/><text x="16" y="60">◆</text>
    <rect x="38" y="38" width="32" height="32" rx="8" fill="#9333ea"/><text x="54" y="60">★</text>
    <rect x="76" y="38" width="32" height="32" rx="8" fill="#9333ea"/><text x="92" y="60">✦</text>
  </g>
</svg>
