<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Count preview</title>
  <desc id="desc">A glowing signal orb and four number choices.</desc>
  <rect width="320" height="200" rx="28" fill="#1e1b4b"/>
  <circle cx="160" cy="78" r="34" fill="#818cf8"/>
  <circle cx="160" cy="78" r="18" fill="#eef2ff"/>
  <g transform="translate(70 128)">
    <rect x="0" y="0" width="40" height="28" rx="8" fill="#4338ca"/>
    <rect x="50" y="0" width="40" height="28" rx="8" fill="#4338ca"/>
    <rect x="100" y="0" width="40" height="28" rx="8" fill="#4338ca"/>
    <rect x="150" y="0" width="40" height="28" rx="8" fill="#4338ca"/>
    <text x="20" y="19" fill="#eef2ff" font-family="monospace" font-size="14" text-anchor="middle">3</text>
    <text x="70" y="19" fill="#eef2ff" font-family="monospace" font-size="14" text-anchor="middle">4</text>
    <text x="120" y="19" fill="#eef2ff" font-family="monospace" font-size="14" text-anchor="middle">5</text>
    <text x="170" y="19" fill="#eef2ff" font-family="monospace" font-size="14" text-anchor="middle">6</text>
  </g>
  <text x="160" y="182" fill="#e0e7ff" font-family="monospace" font-size="16" text-anchor="middle">PULSE COUNT</text>
</svg>
