<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="400" height="280" rx="24" fill="#1e1b2e"/>
  <!-- 3x3 grid of pads -->
  <!-- Row 1 -->
  <rect x="40" y="36" width="96" height="64" rx="14" fill="url(#amber)"/>
  <rect x="152" y="36" width="96" height="64" rx="14" fill="url(#coral)" opacity="0.4"/>
  <rect x="264" y="36" width="96" height="64" rx="14" fill="url(#mint)" opacity="0.4"/>
  <!-- Row 2 -->
  <rect x="40" y="116" width="96" height="64" rx="14" fill="url(#sky)" opacity="0.4"/>
  <rect x="152" y="116" width="96" height="64" rx="14" fill="url(#plum)"/>
  <rect x="264" y="116" width="96" height="64" rx="14" fill="url(#teal)" opacity="0.4"/>
  <!-- Row 3 -->
  <rect x="40" y="196" width="96" height="64" rx="14" fill="url(#rose)" opacity="0.4"/>
  <rect x="152" y="196" width="96" height="64" rx="14" fill="url(#indigo)" opacity="0.4"/>
  <rect x="264" y="196" width="96" height="64" rx="14" fill="url(#slate)" opacity="0.4"/>
  <!-- Flash ring on highlighted pad -->
  <rect x="36" y="32" width="104" height="72" rx="17" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="plum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
</svg>
