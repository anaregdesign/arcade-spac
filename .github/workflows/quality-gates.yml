name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  app:
    name: Validate App And Delivery Assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Production build
        run: npm run build

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Install actionlint
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz -o actionlint.tgz
          tar -xzf actionlint.tgz actionlint
          chmod +x ./actionlint

      - name: Lint GitHub workflows
        run: ./actionlint
