name: Bootstrap Azure Recovery

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Release tag or immutable container image reference to recover, for example v2026.03.18.1 or ghcr.io/anaregdesign/arcade-spec:v2026.03.18.1
        required: true
        type: string
      resource_group_suffix:
        description: Resource-group suffix appended to the shared AZURE_RESOURCE_GROUP prefix
        required: true
        default: green
        type: choice
        options:
          - green
          - blue
          - dev

permissions:
  contents: read

concurrency:
  group: bootstrap-azure-recovery
  cancel-in-progress: false

jobs:
  resolve_recovery_image:
    name: Resolve Recovery Image Reference
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_ref: ${{ steps.resolve_image_ref.outputs.image_ref }}
    env:
      DEFAULT_IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
      IMAGE_REF_INPUT: ${{ inputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Resolve recovery image reference
        id: resolve_image_ref
        run: ./scripts/azure/resolve-image-ref.sh

  ensure_resource_group:
    name: Ensure Azure Resource Group
    runs-on: ubuntu-latest
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Validate bootstrap resource-group configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_LOCATION" || { echo "Missing environment variable AZURE_LOCATION"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update the resource group
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

  deploy_bootstrap_infra:
    name: Deploy Bootstrap Infrastructure
    runs-on: ubuntu-latest
    needs:
      - ensure_resource_group
      - resolve_recovery_image
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      SQL_ADMINISTRATOR_LOGIN: ${{ vars.SQL_ADMINISTRATOR_LOGIN }}
      SQL_ADMINISTRATOR_PASSWORD: ${{ secrets.SQL_ADMINISTRATOR_PASSWORD }}
      IMAGE_REF: ${{ needs.resolve_recovery_image.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate bootstrap infrastructure configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_LOCATION" || { echo "Missing environment variable AZURE_LOCATION"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$IMAGE_REF" || { echo "Missing workflow input image_ref"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve existing hosted resources
        id: resolve_resources
        env:
          AZURE_RECOVER_GLOBAL_RESOURCES: true
        run: ./scripts/azure/resolve-hosted-resource-inputs.sh

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Deploy the hosted baseline with bootstrap RBAC
        id: deploy_bootstrap_infra_async
        run: |
          DEPLOYMENT_NAME="bootstrap-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RESOURCE_NAME_SUFFIX="$AZURE_RESOURCE_GROUP_SUFFIX"
          LOG_ANALYTICS_WORKSPACE_NAME='${{ steps.resolve_resources.outputs.log_analytics_workspace_name }}'
          APPLICATION_INSIGHTS_NAME='${{ steps.resolve_resources.outputs.application_insights_name }}'
          VIRTUAL_NETWORK_NAME='${{ steps.resolve_resources.outputs.virtual_network_name }}'
          MANAGED_ENVIRONMENT_NAME='${{ steps.resolve_resources.outputs.managed_environment_name }}'
          CONTAINER_APP_NAME='${{ steps.resolve_resources.outputs.container_app_name }}'
          SQL_MIGRATION_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_migration_identity_name }}'
          SQL_BOOTSTRAP_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_bootstrap_identity_name }}'
          FRONT_DOOR_PROFILE_NAME='${{ steps.resolve_resources.outputs.front_door_profile_name }}'
          FRONT_DOOR_ENDPOINT_NAME='${{ steps.resolve_resources.outputs.front_door_endpoint_name }}'
          FRONT_DOOR_ORIGIN_GROUP_NAME='${{ steps.resolve_resources.outputs.front_door_origin_group_name }}'
          APP_CONFIGURATION_NAME='${{ steps.resolve_resources.outputs.app_configuration_name }}'
          KEY_VAULT_NAME='${{ steps.resolve_resources.outputs.key_vault_name }}'
          EXISTING_SQL_SERVER_NAME='${{ steps.resolve_resources.outputs.existing_sql_server_name }}'
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          parameters=(
            appName="$AZURE_APP_NAME"
            location="$AZURE_LOCATION"
            containerImage="$IMAGE_REF"
            manageRuntimeRoleAssignments=true
          )

          while IFS= read -r parameter; do
            [[ -n "$parameter" ]] && parameters+=("$parameter")
          done < <(
            RESOURCE_NAME_SUFFIX="$RESOURCE_NAME_SUFFIX" \
            LOG_ANALYTICS_WORKSPACE_NAME="$LOG_ANALYTICS_WORKSPACE_NAME" \
            APPLICATION_INSIGHTS_NAME="$APPLICATION_INSIGHTS_NAME" \
            VIRTUAL_NETWORK_NAME="$VIRTUAL_NETWORK_NAME" \
            MANAGED_ENVIRONMENT_NAME="$MANAGED_ENVIRONMENT_NAME" \
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME" \
            SQL_MIGRATION_IDENTITY_NAME="$SQL_MIGRATION_IDENTITY_NAME" \
            SQL_BOOTSTRAP_IDENTITY_NAME="$SQL_BOOTSTRAP_IDENTITY_NAME" \
            FRONT_DOOR_PROFILE_NAME="$FRONT_DOOR_PROFILE_NAME" \
            FRONT_DOOR_ENDPOINT_NAME="$FRONT_DOOR_ENDPOINT_NAME" \
            FRONT_DOOR_ORIGIN_GROUP_NAME="$FRONT_DOOR_ORIGIN_GROUP_NAME" \
            APP_CONFIGURATION_NAME="$APP_CONFIGURATION_NAME" \
            KEY_VAULT_NAME="$KEY_VAULT_NAME" \
            EXISTING_SQL_SERVER_NAME="$EXISTING_SQL_SERVER_NAME" \
            ./scripts/azure/append-bicep-resource-parameters.sh
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          if [[ -n "$EXISTING_SQL_SERVER_NAME" ]]; then
            echo "Reusing existing Azure SQL server ${EXISTING_SQL_SERVER_NAME}."
          else
            test -n "$SQL_ADMINISTRATOR_LOGIN" || { echo "Missing environment variable SQL_ADMINISTRATOR_LOGIN for new Azure SQL server creation."; exit 1; }
            test -n "$SQL_ADMINISTRATOR_PASSWORD" || { echo "Missing secret SQL_ADMINISTRATOR_PASSWORD for new Azure SQL server creation."; exit 1; }
            parameters+=(
              sqlAdministratorLogin="$SQL_ADMINISTRATOR_LOGIN"
              sqlAdministratorPassword="$SQL_ADMINISTRATOR_PASSWORD"
            )
          fi

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --no-wait \
            --output none

      - name: Approve Azure Front Door private link connections
        env:
          DEPLOYMENT_NAME: ${{ steps.deploy_bootstrap_infra_async.outputs.deployment_name }}
        run: ./scripts/azure/await-frontdoor-private-link.sh

      - name: Wait for bootstrap infrastructure deployment completion
        run: |
          DEPLOYMENT_NAME="${{ steps.deploy_bootstrap_infra_async.outputs.deployment_name }}"
          test -n "$DEPLOYMENT_NAME" || { echo "Missing bootstrap deployment name."; exit 1; }

          az deployment group wait \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --custom "properties.provisioningState=='Succeeded' || properties.provisioningState=='Failed' || properties.provisioningState=='Canceled'" \
            --interval 15 \
            --timeout 3600

          DEPLOYMENT_STATE="$(
            az deployment group show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query properties.provisioningState \
              --output tsv
          )"

          if [[ "$DEPLOYMENT_STATE" != "Succeeded" ]]; then
            az deployment operation group list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState!='Succeeded'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,state:properties.provisioningState,status:properties.statusMessage}" \
              --output json
            echo "Bootstrap deployment finished with state: $DEPLOYMENT_STATE"
            exit 1
          fi

  restore_production_release_rbac:
    name: Restore Production Release RBAC
    runs-on: ubuntu-latest
    needs:
      - deploy_bootstrap_infra
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      PRODUCTION_AZURE_PRINCIPAL_ID: ${{ vars.PRODUCTION_AZURE_PRINCIPAL_ID }}
    steps:
      - name: Validate production release RBAC restore contract
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$PRODUCTION_AZURE_PRINCIPAL_ID" || { echo "Missing environment variable PRODUCTION_AZURE_PRINCIPAL_ID"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Restore production release role assignments
        run: |
          require_single_resource_id() {
            local resource_type="$1"
            local label="$2"
            local resource_id=""

            resource_id="$(
              az resource list \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --resource-type "$resource_type" \
                --query "[0].id" \
                --output tsv
            )"

            test -n "$resource_id" || { echo "Missing ${label} in ${AZURE_RESOURCE_GROUP}."; exit 1; }
            printf '%s\n' "$resource_id"
          }

          ensure_role_assignment() {
            local role_name="$1"
            local scope="$2"

            local existing_count=""
            existing_count="$(
              az role assignment list \
                --assignee-object-id "$PRODUCTION_AZURE_PRINCIPAL_ID" \
                --scope "$scope" \
                --query "[?roleDefinitionName=='${role_name}'] | length(@)" \
                --output tsv
            )"

            if [[ "$existing_count" == "0" ]]; then
              az role assignment create \
                --assignee-object-id "$PRODUCTION_AZURE_PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "$role_name" \
                --scope "$scope" \
                --output none
            fi
          }

          RESOURCE_GROUP_SCOPE="/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${AZURE_RESOURCE_GROUP}"
          APP_CONFIGURATION_ID="$(require_single_resource_id 'Microsoft.AppConfiguration/configurationStores' 'App Configuration store')"
          KEY_VAULT_ID="$(require_single_resource_id 'Microsoft.KeyVault/vaults' 'Key Vault')"

          ensure_role_assignment "Contributor" "$RESOURCE_GROUP_SCOPE"
          ensure_role_assignment "App Configuration Data Owner" "$APP_CONFIGURATION_ID"
          ensure_role_assignment "Key Vault Secrets Officer" "$KEY_VAULT_ID"

          sleep 30

  bootstrap_sql:
    name: Bootstrap Azure SQL Principals
    runs-on: ubuntu-latest
    needs:
      - deploy_bootstrap_infra
      - resolve_recovery_image
    timeout-minutes: 60
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      CONTAINER_REGISTRY_IDENTITY: ${{ vars.CONTAINER_REGISTRY_IDENTITY }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
      CONTAINER_REGISTRY_SERVER: ${{ vars.CONTAINER_REGISTRY_SERVER }}
      CONTAINER_REGISTRY_USERNAME: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
      IMAGE_REF: ${{ needs.resolve_recovery_image.outputs.image_ref }}
    steps:
      - name: Validate SQL bootstrap configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$IMAGE_REF" || { echo "Missing workflow input image_ref"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Create and run the SQL bootstrap job
        id: run_bootstrap_job
        run: |
          source ./scripts/azure/environment-resource-names.sh
          derive_environment_names
          az config set extension.use_dynamic_install=yes_without_prompt >/dev/null
          az config set extension.dynamic_install_allow_preview=true >/dev/null

          require_single_resource_name() {
            local resource_type="$1"
            local label="$2"
            local -a names=()

            while IFS= read -r resource_name; do
              [[ -n "$resource_name" ]] && names+=("$resource_name")
            done < <(az resource list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --resource-type "$resource_type" \
              --query '[].name' \
              --output tsv)

            if [[ "${#names[@]}" -ne 1 ]]; then
              echo "Expected exactly one ${label} in ${AZURE_RESOURCE_GROUP}, found ${#names[@]}."
              exit 1
            fi

            printf '%s\n' "${names[0]}"
          }

          ensure_sql_server_entra_admin() {
            local server_name="$1"
            local bootstrap_identity_name="$2"
            local bootstrap_identity_principal_id="$3"
            local current_admin_object_id=""

            current_admin_object_id="$(az sql server ad-admin list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server "$server_name" \
              --query '[0].sid' \
              --output tsv)"

            if [[ "$current_admin_object_id" == "$bootstrap_identity_principal_id" ]]; then
              return 0
            fi

            az sql server ad-admin create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server "$server_name" \
              --display-name "$bootstrap_identity_name" \
              --object-id "$bootstrap_identity_principal_id" \
              --output none
          }

          ensure_sql_server_entra_only_auth() {
            local server_name="$1"
            local ad_only_auth=""

            ad_only_auth="$(az sql server ad-only-auth get \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$server_name" \
              --query azureADOnlyAuthentication \
              --output tsv 2>/dev/null || true)"

            if [[ -z "$ad_only_auth" ]]; then
              ad_only_auth="$(az sql server ad-only-auth get \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$server_name" \
                --query azureAdOnlyAuthentication \
                --output tsv)"
            fi

            if [[ "$ad_only_auth" == "true" ]]; then
              return 0
            fi

            az sql server ad-only-auth enable \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$server_name" \
              --output none
          }

          delete_sql_bootstrap_job_if_exists() {
            local job_name="$1"

            if az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name "$job_name" --output none >/dev/null 2>&1; then
              echo "Deleting transient SQL bootstrap job ${job_name}."
              az containerapp job delete --resource-group "$AZURE_RESOURCE_GROUP" --name "$job_name" --yes --output none
            fi
          }

          print_sql_bootstrap_job_diagnostics() {
            local job_name="$1"
            local job_execution_name="$2"

            echo "::group::SQL bootstrap execution details"
            az containerapp job execution show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job_name" \
              --job-execution-name "$job_execution_name" \
              --output json || true
            echo "::endgroup::"

            echo "::group::SQL bootstrap container logs"
            az containerapp job logs show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job_name" \
              --execution "$job_execution_name" \
              --container sql-bootstrap \
              --tail 200 \
              --format text || true
            echo "::endgroup::"
          }

          write_sql_bootstrap_job_template() {
            local output_path="$1"

            cat >"$output_path" <<EOF
containers:
  - name: sql-bootstrap
    image: ${IMAGE_REF}
    resources:
      cpu: 0.5
      memory: 1Gi
    command:
      - sh
    args:
      - -lc
      - 'printf ''%s'' "\$ARCADE_SQL_BOOTSTRAP_SOURCE_B64" | base64 -d > /tmp/init-sql.mjs && node /tmp/init-sql.mjs'
    env:
      - name: AZURE_CLIENT_ID
        value: ${SQL_BOOTSTRAP_IDENTITY_CLIENT_ID}
      - name: ARCADE_SQL_BOOTSTRAP_SOURCE_B64
        value: ${SQL_BOOTSTRAP_SOURCE_B64}
      - name: ARCADE_SQL_SERVER
        value: ${SQL_SERVER_NAME}.database.windows.net
      - name: ARCADE_SQL_DATABASE
        value: ${SQL_DATABASE_NAME}
      - name: ARCADE_SQL_RUNTIME_PRINCIPAL
        value: ${SQL_RUNTIME_PRINCIPAL_NAME}
      - name: ARCADE_SQL_RUNTIME_OBJECT_ID
        value: ${SQL_RUNTIME_PRINCIPAL_OBJECT_ID}
      - name: ARCADE_SQL_MIGRATION_PRINCIPAL
        value: ${SQL_MIGRATION_PRINCIPAL_NAME}
      - name: ARCADE_SQL_MIGRATION_OBJECT_ID
        value: ${SQL_MIGRATION_PRINCIPAL_OBJECT_ID}
EOF
          }

          wait_for_sql_bootstrap_job_execution() {
            local job_name="$1"
            local job_execution_name="$2"
            local job_status=""

            for ((attempt = 1; attempt <= 90; attempt++)); do
              job_status="$(az containerapp job execution show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$job_name" \
                --job-execution-name "$job_execution_name" \
                --query properties.status \
                --output tsv)"

              echo "SQL bootstrap execution status: ${job_status}"

              if [[ "$job_status" == "Succeeded" ]]; then
                return 0
              fi

              if [[ "$job_status" == "Failed" ]]; then
                print_sql_bootstrap_job_diagnostics "$job_name" "$job_execution_name"
                return 1
              fi

              sleep 10
            done

            echo "Timed out waiting for SQL bootstrap job completion."
            print_sql_bootstrap_job_diagnostics "$job_name" "$job_execution_name"
            return 1
          }

          CONTAINER_APP_NAME="$(
            resolve_existing_resource_name_by_type \
              'Microsoft.App/containerApps' \
              'Container App' \
              "$AZURE_EXPECTED_CONTAINER_APP_NAME" \
              "$AZURE_LEGACY_CONTAINER_APP_NAME"
          )"
          SQL_BOOTSTRAP_IDENTITY_NAME="$(
            resolve_existing_resource_name_by_type \
              'Microsoft.ManagedIdentity/userAssignedIdentities' \
              'SQL bootstrap identity' \
              "$AZURE_EXPECTED_SQL_BOOTSTRAP_IDENTITY_NAME" \
              "$AZURE_LEGACY_SQL_BOOTSTRAP_IDENTITY_NAME"
          )"
          MANAGED_ENVIRONMENT_ID=""
          for ((attempt = 1; attempt <= 18; attempt++)); do
            MANAGED_ENVIRONMENT_ID="$(
              az containerapp show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$CONTAINER_APP_NAME" \
                --query properties.managedEnvironmentId \
                --output tsv 2>/dev/null || true
            )"

            if [[ -n "$MANAGED_ENVIRONMENT_ID" ]]; then
              break
            fi

            sleep 10
          done

          MANAGED_ENVIRONMENT_NAME="${MANAGED_ENVIRONMENT_ID##*/}"
          SQL_SERVER_NAME="$(require_single_resource_name 'Microsoft.Sql/servers' 'Azure SQL server')"
          SQL_DATABASE_NAME="$(az sql db list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "$SQL_SERVER_NAME" \
            --query "[?name!='master'].name | [0]" \
            --output tsv)"
          SQL_BOOTSTRAP_IDENTITY_PRINCIPAL_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SQL_BOOTSTRAP_IDENTITY_NAME" \
            --query principalId \
            --output tsv)"
          SQL_MIGRATION_IDENTITY_ID="$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --query 'keys(identity.userAssignedIdentities)[0]' \
            --output tsv)"
          SQL_MIGRATION_IDENTITY_NAME="${SQL_MIGRATION_IDENTITY_ID##*/}"
          SQL_MIGRATION_PRINCIPAL_OBJECT_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SQL_MIGRATION_IDENTITY_NAME" \
            --query principalId \
            --output tsv)"
          SQL_MIGRATION_PRINCIPAL_NAME="${SQL_MIGRATION_IDENTITY_ID##*/}"
          SQL_RUNTIME_PRINCIPAL_NAME="$CONTAINER_APP_NAME"
          SQL_RUNTIME_PRINCIPAL_OBJECT_ID="$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --query identity.principalId \
            --output tsv)"
          JOB_NAME="sqlb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SQL_BOOTSTRAP_IDENTITY_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SQL_BOOTSTRAP_IDENTITY_NAME" \
            --query id \
            --output tsv)"
          SQL_BOOTSTRAP_IDENTITY_CLIENT_ID="$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SQL_BOOTSTRAP_IDENTITY_NAME" \
            --query clientId \
            --output tsv)"
          SQL_BOOTSTRAP_SOURCE_B64="$(base64 < ./scripts/azure/init-sql.mjs | tr -d '\n')"
          SQL_BOOTSTRAP_TEMPLATE_PATH="/tmp/sql-bootstrap-template.yaml"

          test -n "$SQL_SERVER_NAME" || { echo "Missing Azure SQL server."; exit 1; }
          test -n "$SQL_DATABASE_NAME" || { echo "Missing Azure SQL database."; exit 1; }
          test -n "$CONTAINER_APP_NAME" || { echo "Missing Container App."; exit 1; }
          test -n "$MANAGED_ENVIRONMENT_NAME" || { echo "Missing Container Apps environment."; exit 1; }
          test -n "$SQL_BOOTSTRAP_IDENTITY_NAME" || { echo "Missing SQL bootstrap identity name."; exit 1; }
          test -n "$SQL_BOOTSTRAP_IDENTITY_PRINCIPAL_ID" || { echo "Missing SQL bootstrap identity principal id."; exit 1; }
          test -n "$SQL_BOOTSTRAP_IDENTITY_ID" || { echo "Missing SQL bootstrap identity id."; exit 1; }
          test -n "$SQL_BOOTSTRAP_IDENTITY_CLIENT_ID" || { echo "Missing SQL bootstrap identity client id."; exit 1; }
          test -n "$SQL_BOOTSTRAP_SOURCE_B64" || { echo "Missing SQL bootstrap source."; exit 1; }
          test -n "$SQL_BOOTSTRAP_TEMPLATE_PATH" || { echo "Missing SQL bootstrap template path."; exit 1; }
          test -n "$SQL_MIGRATION_IDENTITY_ID" || { echo "Missing SQL migration identity id."; exit 1; }
          test -n "$SQL_MIGRATION_PRINCIPAL_NAME" || { echo "Missing SQL migration principal name."; exit 1; }
          test -n "$SQL_MIGRATION_PRINCIPAL_OBJECT_ID" || { echo "Missing SQL migration principal object id."; exit 1; }
          test -n "$SQL_RUNTIME_PRINCIPAL_OBJECT_ID" || { echo "Missing SQL runtime principal object id."; exit 1; }

          MAX_SQL_BOOTSTRAP_ATTEMPTS=3
          SQL_BOOTSTRAP_RETRY_DELAY_SECONDS=30

          registry_args=()
          if [[ -n "${CONTAINER_REGISTRY_SERVER:-}" ]]; then
            registry_args+=(--registry-server "$CONTAINER_REGISTRY_SERVER")

            if [[ -n "${CONTAINER_REGISTRY_IDENTITY:-}" ]]; then
              registry_args+=(--registry-identity "$CONTAINER_REGISTRY_IDENTITY")
            elif [[ -n "${CONTAINER_REGISTRY_USERNAME:-}" && -n "${CONTAINER_REGISTRY_PASSWORD:-}" ]]; then
              registry_args+=(--registry-username "$CONTAINER_REGISTRY_USERNAME" --registry-password "$CONTAINER_REGISTRY_PASSWORD")
            else
              echo "Registry configuration is incomplete."
              exit 1
            fi
          fi

          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"
          delete_sql_bootstrap_job_if_exists "$JOB_NAME"

          for ((bootstrap_attempt = 1; bootstrap_attempt <= MAX_SQL_BOOTSTRAP_ATTEMPTS; bootstrap_attempt++)); do
            ensure_sql_server_entra_admin \
              "$SQL_SERVER_NAME" \
              "$SQL_BOOTSTRAP_IDENTITY_NAME" \
              "$SQL_BOOTSTRAP_IDENTITY_PRINCIPAL_ID"
            ensure_sql_server_entra_only_auth "$SQL_SERVER_NAME"
            write_sql_bootstrap_job_template "$SQL_BOOTSTRAP_TEMPLATE_PATH"

            echo "Creating SQL bootstrap job ${JOB_NAME} (attempt ${bootstrap_attempt}/${MAX_SQL_BOOTSTRAP_ATTEMPTS})."
            az containerapp job create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$JOB_NAME" \
              --environment "$MANAGED_ENVIRONMENT_NAME" \
              --trigger-type Manual \
              --replica-timeout 1800 \
              --replica-retry-limit 0 \
              --replica-completion-count 1 \
              --parallelism 1 \
              --container-name sql-bootstrap \
              --image "$IMAGE_REF" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --mi-user-assigned "$SQL_BOOTSTRAP_IDENTITY_ID" \
              "${registry_args[@]}" \
              --output none

            echo "Starting SQL bootstrap job ${JOB_NAME}."
            az containerapp job start \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$JOB_NAME" \
              --yaml "$SQL_BOOTSTRAP_TEMPLATE_PATH" \
              --output none

            JOB_EXECUTION_NAME=""
            for ((attempt = 1; attempt <= 18; attempt++)); do
              echo "Waiting for SQL bootstrap execution discovery (${attempt}/18)."
              JOB_EXECUTION_NAME="$(az containerapp job execution list \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$JOB_NAME" \
                --query "sort_by(@,&properties.startTime)[-1].name" \
                --output tsv)"

              if [[ -n "$JOB_EXECUTION_NAME" ]]; then
                break
              fi

              sleep 10
            done

            test -n "$JOB_EXECUTION_NAME" || { echo "Missing SQL bootstrap job execution."; exit 1; }
            echo "Following SQL bootstrap execution ${JOB_EXECUTION_NAME}."

            if wait_for_sql_bootstrap_job_execution "$JOB_NAME" "$JOB_EXECUTION_NAME"; then
              exit 0
            fi

            delete_sql_bootstrap_job_if_exists "$JOB_NAME"

            if (( bootstrap_attempt == MAX_SQL_BOOTSTRAP_ATTEMPTS )); then
              exit 1
            fi

            echo "SQL bootstrap job attempt ${bootstrap_attempt}/${MAX_SQL_BOOTSTRAP_ATTEMPTS} failed. Retrying in ${SQL_BOOTSTRAP_RETRY_DELAY_SECONDS}s."
            sleep "$SQL_BOOTSTRAP_RETRY_DELAY_SECONDS"
          done

      - name: Delete the SQL bootstrap job
        if: ${{ always() }}
        run: |
          JOB_NAME="${{ steps.run_bootstrap_job.outputs.job_name }}"
          [[ -n "$JOB_NAME" ]] || exit 0
          if az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name "$JOB_NAME" --output none >/dev/null 2>&1; then
            az containerapp job delete --resource-group "$AZURE_RESOURCE_GROUP" --name "$JOB_NAME" --yes --output none
          fi

  sync_runtime_config:
    name: Sync Runtime Config To Azure Stores
    runs-on: ubuntu-latest
    needs:
      - deploy_bootstrap_infra
      - restore_production_release_rbac
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      config_changed: ${{ steps.sync_runtime_config.outputs.config_changed }}
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ENTRA_AUTHORITY_TENANT: ${{ vars.ENTRA_AUTHORITY_TENANT }}
      ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}
      ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      ARCADE_SESSION_SECRET: ${{ secrets.ARCADE_SESSION_SECRET }}
      ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate runtime config sync contract
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$ENTRA_CLIENT_ID" || { echo "Missing environment variable ENTRA_CLIENT_ID"; exit 1; }
          test -n "$ENTRA_CLIENT_SECRET" || { echo "Missing secret ENTRA_CLIENT_SECRET"; exit 1; }
          test -n "$ARCADE_SESSION_SECRET" || { echo "Missing secret ARCADE_SESSION_SECRET"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sync runtime config to App Configuration and Key Vault
        id: sync_runtime_config
        env:
          ARCADE_AUTH_MODE: entra
        run: ./scripts/azure/sync-runtime-config.sh

  deploy_app:
    name: Deploy Recovery Image To Azure Container Apps
    runs-on: ubuntu-latest
    needs:
      - bootstrap_sql
      - resolve_recovery_image
      - sync_runtime_config
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      app_url: ${{ steps.public_endpoint.outputs.app_url }}
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      CONTAINER_REGISTRY_IDENTITY: ${{ vars.CONTAINER_REGISTRY_IDENTITY }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
      CONTAINER_REGISTRY_SERVER: ${{ vars.CONTAINER_REGISTRY_SERVER }}
      CONTAINER_REGISTRY_USERNAME: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
      FORCE_CONTAINER_APP_UPDATE: ${{ needs.sync_runtime_config.outputs.config_changed }}
      IMAGE_REF: ${{ needs.resolve_recovery_image.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate app deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$IMAGE_REF" || { echo "Missing workflow input image_ref"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Configure registry access when required
        run: bash ./scripts/azure/postprovision.sh

      - name: Deploy immutable recovery image
        run: ./scripts/azure/deploy-container-app-image.sh

      - name: Discover deployed public endpoint
        id: public_endpoint
        run: |
          FRONT_DOOR_ENDPOINT_ID="$(
            az resource list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --resource-type "Microsoft.Cdn/profiles/afdEndpoints" \
              --query "[0].id" \
              --output tsv
          )"

          test -n "$FRONT_DOOR_ENDPOINT_ID" || { echo "Missing Front Door endpoint resource."; exit 1; }

          FRONT_DOOR_HOST="$(
            az resource show \
              --ids "$FRONT_DOOR_ENDPOINT_ID" \
              --query properties.hostName \
              --output tsv
          )"

          test -n "$FRONT_DOOR_HOST" || { echo "Missing Front Door endpoint host."; exit 1; }
          echo "app_url=https://${FRONT_DOOR_HOST}" >> "$GITHUB_OUTPUT"

  smoke_test:
    name: Smoke Test Recovered Release
    runs-on: ubuntu-latest
    needs:
      - deploy_app
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate smoke test target
        env:
          APP_URL: ${{ needs.deploy_app.outputs.app_url }}
        run: test -n "$APP_URL" || { echo "Missing deployment output app_url"; exit 1; }

      - name: Smoke test recovered release
        env:
          APP_URL: ${{ needs.deploy_app.outputs.app_url }}
          SMOKE_TEST_RETRIES: "90"
        run: ./scripts/azure/smoke-test.sh

  verify_runtime:
    name: Verify Recovered Runtime
    runs-on: ubuntu-latest
    needs:
      - smoke_test
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate runtime verification configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Verify recovered runtime
        uses: azure/cli@v2
        with:
          inlineScript: |
            chmod +x ./scripts/azure/verify-production-runtime.sh
            ./scripts/azure/verify-production-runtime.sh
