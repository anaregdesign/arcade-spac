name: Bootstrap Azure Recovery

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Release tag or immutable container image reference to recover, for example v2026.03.18.1 or ghcr.io/anaregdesign/arcade-spec:v2026.03.18.1
        required: true
        type: string
      resource_group_suffix:
        description: Side-by-side recovery suffix appended to the shared AZURE_RESOURCE_GROUP prefix; must differ from the routine production suffix
        required: true
        default: blue
        type: choice
        options:
          - blue
          - dev

env:
  ROUTINE_PRODUCTION_RESOURCE_GROUP_SUFFIX: green

permissions:
  contents: read

concurrency:
  group: bootstrap-azure-recovery
  cancel-in-progress: false

jobs:
  validate_recovery_target:
    name: Validate Recovery Target
    runs-on: ubuntu-latest
    env:
      TARGET_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
    steps:
      - name: Validate side-by-side recovery suffix
        run: |
          test -n "$TARGET_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          test -n "$ROUTINE_PRODUCTION_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow constant ROUTINE_PRODUCTION_RESOURCE_GROUP_SUFFIX"; exit 1; }

          if [[ "$TARGET_RESOURCE_GROUP_SUFFIX" == "$ROUTINE_PRODUCTION_RESOURCE_GROUP_SUFFIX" ]]; then
            echo "Bootstrap Azure Recovery must target a side-by-side replica suffix. ${ROUTINE_PRODUCTION_RESOURCE_GROUP_SUFFIX} is reserved for the routine production environment." >&2
            exit 1
          fi

  resolve_recovery_image:
    name: Resolve Recovery Image Reference
    runs-on: ubuntu-latest
    needs:
      - validate_recovery_target
    permissions:
      contents: read
    outputs:
      image_ref: ${{ steps.resolve_image_ref.outputs.image_ref }}
    env:
      DEFAULT_IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
      IMAGE_REF_INPUT: ${{ inputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Resolve recovery image reference
        id: resolve_image_ref
        run: ./scripts/azure/resolve-image-ref.sh

  ensure_resource_group:
    name: Ensure Azure Resource Group
    runs-on: ubuntu-latest
    needs:
      - validate_recovery_target
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Validate bootstrap resource-group configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_LOCATION" || { echo "Missing environment variable AZURE_LOCATION"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update the resource group
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

  deploy_bootstrap_infra:
    name: Deploy Bootstrap Infrastructure
    runs-on: ubuntu-latest
    needs:
      - ensure_resource_group
      - resolve_recovery_image
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      SQL_ADMINISTRATOR_LOGIN: ${{ vars.SQL_ADMINISTRATOR_LOGIN }}
      SQL_ADMINISTRATOR_PASSWORD: ${{ secrets.SQL_ADMINISTRATOR_PASSWORD }}
      IMAGE_REF: ${{ needs.resolve_recovery_image.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate bootstrap infrastructure configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_LOCATION" || { echo "Missing environment variable AZURE_LOCATION"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$IMAGE_REF" || { echo "Missing workflow input image_ref"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve existing hosted resources
        id: resolve_resources
        env:
          AZURE_RECOVER_GLOBAL_RESOURCES: true
        run: ./scripts/azure/resolve-hosted-resource-inputs.sh

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Deploy the hosted baseline with bootstrap RBAC
        id: deploy_bootstrap_infra_async
        run: |
          DEPLOYMENT_NAME="bootstrap-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RESOURCE_NAME_SUFFIX="$AZURE_RESOURCE_GROUP_SUFFIX"
          LOG_ANALYTICS_WORKSPACE_NAME='${{ steps.resolve_resources.outputs.log_analytics_workspace_name }}'
          APPLICATION_INSIGHTS_NAME='${{ steps.resolve_resources.outputs.application_insights_name }}'
          VIRTUAL_NETWORK_NAME='${{ steps.resolve_resources.outputs.virtual_network_name }}'
          MANAGED_ENVIRONMENT_NAME='${{ steps.resolve_resources.outputs.managed_environment_name }}'
          CONTAINER_APP_NAME='${{ steps.resolve_resources.outputs.container_app_name }}'
          SQL_RUNTIME_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_runtime_identity_name }}'
          SQL_MIGRATION_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_migration_identity_name }}'
          SQL_BOOTSTRAP_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_bootstrap_identity_name }}'
          FRONT_DOOR_PROFILE_NAME='${{ steps.resolve_resources.outputs.front_door_profile_name }}'
          FRONT_DOOR_ENDPOINT_NAME='${{ steps.resolve_resources.outputs.front_door_endpoint_name }}'
          FRONT_DOOR_ORIGIN_GROUP_NAME='${{ steps.resolve_resources.outputs.front_door_origin_group_name }}'
          APP_CONFIGURATION_NAME='${{ steps.resolve_resources.outputs.app_configuration_name }}'
          KEY_VAULT_NAME='${{ steps.resolve_resources.outputs.key_vault_name }}'
          EXISTING_SQL_SERVER_NAME='${{ steps.resolve_resources.outputs.existing_sql_server_name }}'
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          parameters=(
            appName="$AZURE_APP_NAME"
            location="$AZURE_LOCATION"
            containerImage="$IMAGE_REF"
            manageRuntimeRoleAssignments=true
          )

          while IFS= read -r parameter; do
            [[ -n "$parameter" ]] && parameters+=("$parameter")
          done < <(
            RESOURCE_NAME_SUFFIX="$RESOURCE_NAME_SUFFIX" \
            LOG_ANALYTICS_WORKSPACE_NAME="$LOG_ANALYTICS_WORKSPACE_NAME" \
            APPLICATION_INSIGHTS_NAME="$APPLICATION_INSIGHTS_NAME" \
            VIRTUAL_NETWORK_NAME="$VIRTUAL_NETWORK_NAME" \
            MANAGED_ENVIRONMENT_NAME="$MANAGED_ENVIRONMENT_NAME" \
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME" \
            SQL_RUNTIME_IDENTITY_NAME="$SQL_RUNTIME_IDENTITY_NAME" \
            SQL_MIGRATION_IDENTITY_NAME="$SQL_MIGRATION_IDENTITY_NAME" \
            SQL_BOOTSTRAP_IDENTITY_NAME="$SQL_BOOTSTRAP_IDENTITY_NAME" \
            FRONT_DOOR_PROFILE_NAME="$FRONT_DOOR_PROFILE_NAME" \
            FRONT_DOOR_ENDPOINT_NAME="$FRONT_DOOR_ENDPOINT_NAME" \
            FRONT_DOOR_ORIGIN_GROUP_NAME="$FRONT_DOOR_ORIGIN_GROUP_NAME" \
            APP_CONFIGURATION_NAME="$APP_CONFIGURATION_NAME" \
            KEY_VAULT_NAME="$KEY_VAULT_NAME" \
            EXISTING_SQL_SERVER_NAME="$EXISTING_SQL_SERVER_NAME" \
            ./scripts/azure/append-bicep-resource-parameters.sh
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          if [[ -n "$EXISTING_SQL_SERVER_NAME" ]]; then
            echo "Reusing existing Azure SQL server ${EXISTING_SQL_SERVER_NAME}."
          else
            test -n "$SQL_ADMINISTRATOR_LOGIN" || { echo "Missing environment variable SQL_ADMINISTRATOR_LOGIN for new Azure SQL server creation."; exit 1; }
            test -n "$SQL_ADMINISTRATOR_PASSWORD" || { echo "Missing secret SQL_ADMINISTRATOR_PASSWORD for new Azure SQL server creation."; exit 1; }
            parameters+=(
              sqlAdministratorLogin="$SQL_ADMINISTRATOR_LOGIN"
              sqlAdministratorPassword="$SQL_ADMINISTRATOR_PASSWORD"
            )
          fi

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --no-wait \
            --output none

      - name: Approve Azure Front Door private link connections
        env:
          DEPLOYMENT_NAME: ${{ steps.deploy_bootstrap_infra_async.outputs.deployment_name }}
          FRONT_DOOR_PRIVATE_LINK_MAX_WAIT_SECONDS: "3600"
          FRONT_DOOR_PRIVATE_LINK_DELAY_SECONDS: "10"
        run: ./scripts/azure/await-frontdoor-private-link.sh

      - name: Wait for bootstrap infrastructure deployment completion
        run: |
          DEPLOYMENT_NAME="${{ steps.deploy_bootstrap_infra_async.outputs.deployment_name }}"
          test -n "$DEPLOYMENT_NAME" || { echo "Missing bootstrap deployment name."; exit 1; }

          az deployment group wait \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --custom "properties.provisioningState=='Succeeded' || properties.provisioningState=='Failed' || properties.provisioningState=='Canceled'" \
            --interval 15 \
            --timeout 3600

          DEPLOYMENT_STATE="$(
            az deployment group show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query properties.provisioningState \
              --output tsv
          )"

          if [[ "$DEPLOYMENT_STATE" != "Succeeded" ]]; then
            az deployment operation group list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState!='Succeeded'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,state:properties.provisioningState,status:properties.statusMessage}" \
              --output json
            echo "Bootstrap deployment finished with state: $DEPLOYMENT_STATE"
            exit 1
          fi

  restore_production_release_rbac:
    name: Restore Production Release RBAC
    runs-on: ubuntu-latest
    needs:
      - deploy_bootstrap_infra
    environment: production-bootstrap
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      PRODUCTION_AZURE_PRINCIPAL_ID: ${{ vars.PRODUCTION_AZURE_PRINCIPAL_ID }}
    steps:
      - name: Validate production release RBAC restore contract
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$PRODUCTION_AZURE_PRINCIPAL_ID" || { echo "Missing environment variable PRODUCTION_AZURE_PRINCIPAL_ID"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Restore production release role assignments
        run: |
          require_single_resource_id() {
            local resource_type="$1"
            local label="$2"
            local resource_id=""

            resource_id="$(
              az resource list \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --resource-type "$resource_type" \
                --query "[0].id" \
                --output tsv
            )"

            test -n "$resource_id" || { echo "Missing ${label} in ${AZURE_RESOURCE_GROUP}."; exit 1; }
            printf '%s\n' "$resource_id"
          }

          ensure_role_assignment() {
            local role_name="$1"
            local scope="$2"

            local existing_count=""
            existing_count="$(
              az role assignment list \
                --assignee-object-id "$PRODUCTION_AZURE_PRINCIPAL_ID" \
                --scope "$scope" \
                --query "[?roleDefinitionName=='${role_name}'] | length(@)" \
                --output tsv
            )"

            if [[ "$existing_count" == "0" ]]; then
              az role assignment create \
                --assignee-object-id "$PRODUCTION_AZURE_PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "$role_name" \
                --scope "$scope" \
                --output none
            fi
          }

          RESOURCE_GROUP_SCOPE="/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${AZURE_RESOURCE_GROUP}"
          APP_CONFIGURATION_ID="$(require_single_resource_id 'Microsoft.AppConfiguration/configurationStores' 'App Configuration store')"
          KEY_VAULT_ID="$(require_single_resource_id 'Microsoft.KeyVault/vaults' 'Key Vault')"

          ensure_role_assignment "Contributor" "$RESOURCE_GROUP_SCOPE"
          ensure_role_assignment "App Configuration Data Owner" "$APP_CONFIGURATION_ID"
          ensure_role_assignment "Key Vault Secrets Officer" "$KEY_VAULT_ID"

          sleep 30

  rollout_recovery:
    name: Run Shared Azure Rollout
    needs:
      - resolve_recovery_image
      - deploy_bootstrap_infra
      - restore_production_release_rbac
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/shared-azure-rollout.yml
    with:
      image_ref: ${{ needs.resolve_recovery_image.outputs.image_ref }}
      resource_group_suffix: ${{ inputs.resource_group_suffix }}
      bootstrap_environment: production-bootstrap
      deployment_environment: production
      smoke_test_retries: "90"
    secrets: inherit

  verify_runtime:
    name: Verify Recovered Runtime
    runs-on: ubuntu-latest
    needs:
      - rollout_recovery
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_RESOURCE_GROUP_SUFFIX: ${{ inputs.resource_group_suffix }}
      AZURE_RESOURCE_GROUP: ${{ format('{0}-{1}', vars.AZURE_RESOURCE_GROUP, inputs.resource_group_suffix) }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate runtime verification configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow input resource_group_suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Verify recovered runtime
        uses: azure/cli@v2
        env:
          VERIFY_AUTH_REDIRECT_PUBLIC_APP_URL: "false"
        with:
          inlineScript: |
            chmod +x ./scripts/azure/verify-production-runtime.sh
            ./scripts/azure/verify-production-runtime.sh
