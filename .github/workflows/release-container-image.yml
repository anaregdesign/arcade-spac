name: Release Azure Delivery

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build And Publish To GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha,format=short

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record immutable image reference
        id: image
        run: echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  plan_infra:
    name: Plan Azure Infrastructure
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ !github.event.release.prerelease }}
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
      infra_image_ref: ${{ steps.discover.outputs.infra_image_ref }}
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      RELEASE_IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate infra planning configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Discover current deploy state
        id: discover
        run: |
          CURRENT_IMAGE_REF="$(
            az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "ca-${AZURE_APP_NAME}" \
              --query 'properties.template.containers[0].image' \
              --output tsv 2>/dev/null || true
          )"
          INFRA_IMAGE_REF="${CURRENT_IMAGE_REF:-$RELEASE_IMAGE_REF}"

          echo "infra_image_ref=$INFRA_IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Plan infrastructure changes
        id: plan
        run: |
          parameters=(
            appName="$AZURE_APP_NAME"
            manageRuntimeRoleAssignments=false
            containerImage="${{ steps.discover.outputs.infra_image_ref }}"
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --result-format ResourceIdOnly \
            --no-pretty-print \
            --output json > whatif.json

          python3 - <<'PY'
          import json
          import os

          with open("whatif.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          changes = []
          if isinstance(payload, dict):
              changes = payload.get("changes")
              if changes is None:
                  changes = payload.get("properties", {}).get("changes", [])

          filtered = [
              change for change in changes
              if change.get("changeType") not in {"NoChange", "Ignore"}
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"has_changes={'true' if filtered else 'false'}\n")
          PY

  deploy_infra:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest
    needs:
      - publish
      - plan_infra
    if: ${{ !github.event.release.prerelease && needs.plan_infra.outputs.has_changes == 'true' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      INFRA_IMAGE_REF: ${{ needs.plan_infra.outputs.infra_image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate release deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Deploy infrastructure baseline
        id: deploy_infra_async
        run: |
          DEPLOYMENT_NAME="release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          parameters=(
            appName="$AZURE_APP_NAME"
            manageRuntimeRoleAssignments=false
            containerImage="$INFRA_IMAGE_REF"
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --no-wait \
            --output none

      - name: Approve Azure Front Door private link connections
        run: |
          MANAGED_ENVIRONMENT_ID=""
          for attempt in $(seq 1 18); do
            MANAGED_ENVIRONMENT_ID="$(
              az containerapp show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "ca-${AZURE_APP_NAME}" \
                --query properties.managedEnvironmentId \
                --output tsv 2>/dev/null || true
            )"

            if [[ -n "$MANAGED_ENVIRONMENT_ID" ]]; then
              break
            fi

            sleep 10
          done

          test -n "$MANAGED_ENVIRONMENT_ID" || { echo "Unable to resolve the Container Apps environment for ca-${AZURE_APP_NAME}."; exit 1; }

          MANAGED_ENVIRONMENT_NAME="${MANAGED_ENVIRONMENT_ID##*/}"
          CONNECTION_IDS=()

          for attempt in $(seq 1 18); do
            mapfile -t CONNECTION_IDS < <(az network private-endpoint-connection list \
              --name "$MANAGED_ENVIRONMENT_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --type Microsoft.App/managedEnvironments \
              --query "[].id" \
              --output tsv 2>/dev/null || true)

            if [[ "${#CONNECTION_IDS[@]}" -gt 0 ]]; then
              break
            fi

            sleep 10
          done

          if [[ "${#CONNECTION_IDS[@]}" -lt 1 ]]; then
            echo "No Azure Front Door private endpoint connections were discovered for ${MANAGED_ENVIRONMENT_NAME}."
            exit 1
          fi

          for connection_id in "${CONNECTION_IDS[@]}"; do
            connection_status="$(
              az resource show \
                --ids "$connection_id" \
                --query properties.privateLinkServiceConnectionState.status \
                --output tsv
            )"

            if [[ "$connection_status" != "Approved" ]]; then
              az network private-endpoint-connection approve --id "$connection_id" --output none
            fi
          done

          for attempt in $(seq 1 18); do
            pending_count="$(
              az network private-endpoint-connection list \
                --name "$MANAGED_ENVIRONMENT_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --type Microsoft.App/managedEnvironments \
                --query "[?properties.privateLinkServiceConnectionState.status!='Approved'] | length(@)" \
                --output tsv
            )"

            if [[ "$pending_count" == "0" ]]; then
              break
            fi

            sleep 10
          done

          test "$pending_count" == "0" || { echo "Azure Front Door private endpoint connections are still pending approval."; exit 1; }

      - name: Wait for infrastructure deployment completion
        run: |
          DEPLOYMENT_NAME="${{ steps.deploy_infra_async.outputs.deployment_name }}"
          test -n "$DEPLOYMENT_NAME" || { echo "Missing release deployment name."; exit 1; }

          az deployment group wait \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --custom "properties.provisioningState=='Succeeded' || properties.provisioningState=='Failed' || properties.provisioningState=='Canceled'" \
            --interval 15 \
            --timeout 3600

          DEPLOYMENT_STATE="$(
            az deployment group show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query properties.provisioningState \
              --output tsv
          )"

          if [[ "$DEPLOYMENT_STATE" != "Succeeded" ]]; then
            az deployment operation group list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState!='Succeeded'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,state:properties.provisioningState,status:properties.statusMessage}" \
              --output json
            echo "Release infrastructure deployment finished with state: $DEPLOYMENT_STATE"
            exit 1
          fi

  sync_runtime_config:
    name: Sync Runtime Config To Azure Stores
    runs-on: ubuntu-latest
    needs:
      - publish
      - plan_infra
      - deploy_infra
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !github.event.release.prerelease &&
        needs.publish.result == 'success' &&
        needs.plan_infra.result == 'success' &&
        (needs.deploy_infra.result == 'success' || needs.deploy_infra.result == 'skipped')
      }}
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ENTRA_AUTHORITY_TENANT: ${{ vars.ENTRA_AUTHORITY_TENANT }}
      ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}
      ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      ARCADE_SESSION_SECRET: ${{ secrets.ARCADE_SESSION_SECRET }}
      ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate runtime config sync contract
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }
          test -n "$ENTRA_CLIENT_ID" || { echo "Missing environment variable ENTRA_CLIENT_ID"; exit 1; }
          test -n "$ENTRA_CLIENT_SECRET" || { echo "Missing secret ENTRA_CLIENT_SECRET"; exit 1; }
          test -n "$ARCADE_SESSION_SECRET" || { echo "Missing secret ARCADE_SESSION_SECRET"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sync runtime config to App Configuration and Key Vault
        env:
          ARCADE_AUTH_MODE: entra
        run: ./scripts/azure/sync-runtime-config.sh

  deploy_app:
    name: Deploy Release To Azure Container Apps
    runs-on: ubuntu-latest
    needs:
      - publish
      - plan_infra
      - deploy_infra
      - sync_runtime_config
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !github.event.release.prerelease &&
        needs.publish.result == 'success' &&
        needs.plan_infra.result == 'success' &&
        (needs.deploy_infra.result == 'success' || needs.deploy_infra.result == 'skipped') &&
        needs.sync_runtime_config.result == 'success'
      }}
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      app_url: ${{ steps.public_endpoint.outputs.app_url }}
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      CONTAINER_REGISTRY_IDENTITY: ${{ vars.CONTAINER_REGISTRY_IDENTITY }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
      CONTAINER_REGISTRY_SERVER: ${{ vars.CONTAINER_REGISTRY_SERVER }}
      CONTAINER_REGISTRY_USERNAME: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
      IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate app deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Configure registry access when required
        run: bash ./scripts/azure/postprovision.sh

      - name: Deploy immutable release image
        run: |
          az containerapp update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "ca-${AZURE_APP_NAME}" \
            --image "$IMAGE_REF" \
            --output none

      - name: Discover deployed public endpoint
        id: public_endpoint
        run: |
          FRONT_DOOR_ENDPOINT_ID="$(
            az resource list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --resource-type "Microsoft.Cdn/profiles/afdEndpoints" \
              --query "[0].id" \
              --output tsv
          )"

          test -n "$FRONT_DOOR_ENDPOINT_ID" || { echo "Missing Front Door endpoint resource."; exit 1; }

          FRONT_DOOR_HOST="$(
            az resource show \
              --ids "$FRONT_DOOR_ENDPOINT_ID" \
              --query properties.hostName \
              --output tsv
          )"

          test -n "$FRONT_DOOR_HOST" || { echo "Missing Front Door endpoint host."; exit 1; }
          echo "app_url=https://${FRONT_DOOR_HOST}" >> "$GITHUB_OUTPUT"

  smoke_test:
    name: Smoke Test Deployed Release
    runs-on: ubuntu-latest
    needs:
      - deploy_app
      - deploy_infra
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !github.event.release.prerelease &&
        needs.deploy_app.result == 'success' &&
        (needs.deploy_infra.result == 'success' || needs.deploy_infra.result == 'skipped')
      }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate smoke test target
        env:
          APP_URL: ${{ needs.deploy_app.outputs.app_url }}
        run: test -n "$APP_URL" || { echo "Missing deployment output app_url"; exit 1; }

      - name: Smoke test deployed release
        env:
          APP_URL: ${{ needs.deploy_app.outputs.app_url }}
          SMOKE_TEST_RETRIES: ${{ needs.deploy_infra.result == 'success' && '90' || '18' }}
        run: ./scripts/azure/smoke-test.sh
