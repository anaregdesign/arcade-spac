name: Release Azure Delivery

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_RESOURCE_GROUP_SUFFIX: green

jobs:
  publish:
    name: Build And Publish To GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha,format=short

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record immutable image reference
        id: image
        run: echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  classify_release_scope:
    name: Classify Release Infra Scope
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    permissions:
      contents: read
    outputs:
      requires_rollout: ${{ steps.classify.outputs.requires_rollout }}
      requires_infra: ${{ steps.classify.outputs.requires_infra }}
      requires_runtime_config_sync: ${{ steps.classify.outputs.requires_runtime_config_sync }}
      requires_database_jobs: ${{ steps.classify.outputs.requires_database_jobs }}
      previous_tag: ${{ steps.classify.outputs.previous_tag }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify release diff
        id: classify
        env:
          CURRENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          git fetch --force --tags

          PREVIOUS_TAG="$({
            git tag --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1
          } || true)"

          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

          if [[ -z "$PREVIOUS_TAG" ]]; then
            echo "requires_rollout=true" >> "$GITHUB_OUTPUT"
            echo "requires_infra=true" >> "$GITHUB_OUTPUT"
            echo "requires_runtime_config_sync=true" >> "$GITHUB_OUTPUT"
            echo "requires_database_jobs=true" >> "$GITHUB_OUTPUT"
            echo "No previous release tag was found. Running infra planning defensively." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          ALL_CHANGED_PATHS="$({
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG"
          } || true)"

          INFRA_CHANGED_PATHS="$({
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" -- \
              infra \
              scripts/azure/append-bicep-resource-parameters.sh \
              scripts/azure/environment-resource-names.sh \
              scripts/azure/resolve-hosted-resource-inputs.sh
          } || true)"

          RUNTIME_CONFIG_CHANGED_PATHS="$({
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" -- \
              .github/workflows/shared-azure-rollout.yml \
              scripts/azure/sync-runtime-config.sh \
              scripts/azure/sync-container-app-runtime-env.sh \
              scripts/azure/verify-production-runtime.sh \
              app/lib/server/infrastructure/config
          } || true)"

          DATABASE_CHANGED_PATHS="$({
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" -- \
              prisma \
              prisma.config.ts \
              scripts/prisma-sql-migration-runner.mjs \
              scripts/run-migrations.mjs \
              scripts/azure/init-sql.mjs \
              scripts/azure/run-prisma-migration-job.sh \
              scripts/azure/run-sql-bootstrap-job.sh
          } || true)"

          ROLLOUT_CHANGED_PATHS="$({
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" -- \
              Dockerfile \
              package.json \
              package-lock.json \
              tsconfig.json \
              vite.config.ts \
              react-router.config.ts \
              prisma.config.ts \
              app \
              lib \
              public \
              prisma \
              scripts/start-server.mjs \
              scripts/serve-runtime.mjs \
              scripts/azure/deploy-container-app-image.sh \
              scripts/azure/postprovision.sh \
              scripts/azure/smoke-test.sh \
              scripts/azure/sync-container-app-runtime-env.sh
          } || true)"

          if [[ -n "$INFRA_CHANGED_PATHS" ]]; then
            echo "requires_infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_infra=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$RUNTIME_CONFIG_CHANGED_PATHS" || -n "$INFRA_CHANGED_PATHS" ]]; then
            echo "requires_runtime_config_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_runtime_config_sync=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$DATABASE_CHANGED_PATHS" || -n "$INFRA_CHANGED_PATHS" ]]; then
            echo "requires_database_jobs=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_database_jobs=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$INFRA_CHANGED_PATHS" || -n "$RUNTIME_CONFIG_CHANGED_PATHS" || -n "$DATABASE_CHANGED_PATHS" || -n "$ROLLOUT_CHANGED_PATHS" ]]; then
            echo "requires_rollout=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_rollout=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "Release diff classification for $PREVIOUS_TAG -> $CURRENT_TAG:"
            echo
            if [[ -n "$ALL_CHANGED_PATHS" ]]; then
              echo "Changed paths:"
              printf '%s\n' "$ALL_CHANGED_PATHS"
              echo
            else
              echo "No repository paths changed between the compared tags."
              echo
            fi

            if [[ -n "$INFRA_CHANGED_PATHS" ]]; then
              echo "Infra-owned paths changed, so infra planning remains enabled:"
              printf '%s\n' "$INFRA_CHANGED_PATHS"
              echo
            else
              echo "No infra-owned path changes were detected."
              echo
            fi

            if [[ -n "$RUNTIME_CONFIG_CHANGED_PATHS" ]]; then
              echo "Runtime-config-owned paths changed, so App Configuration and Key Vault sync remains enabled:"
              printf '%s\n' "$RUNTIME_CONFIG_CHANGED_PATHS"
              echo
            else
              echo "No runtime-config-owned path changes were detected."
              echo
            fi

            if [[ -n "$DATABASE_CHANGED_PATHS" ]]; then
              echo "Database-owned paths changed, so SQL bootstrap and migration jobs remain enabled:"
              printf '%s\n' "$DATABASE_CHANGED_PATHS"
              echo
            else
              echo "No database-owned path changes were detected."
              echo
            fi

            if [[ -n "$ROLLOUT_CHANGED_PATHS" ]]; then
              echo "Rollout-owned application paths changed, so app deploy remains enabled:"
              printf '%s\n' "$ROLLOUT_CHANGED_PATHS"
            else
              echo "No rollout-owned application paths changed. The release will publish the image only and skip the shared Azure rollout."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  plan_infra:
    name: Plan Azure Infrastructure
    runs-on: ubuntu-latest
    needs:
      - publish
      - classify_release_scope
    if: ${{ !github.event.release.prerelease && needs.classify_release_scope.outputs.requires_infra == 'true' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
      infra_image_ref: ${{ steps.discover.outputs.infra_image_ref }}
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      RELEASE_IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Derive target resource group
        run: echo "AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP_PREFIX}-${AZURE_RESOURCE_GROUP_SUFFIX}" >> "$GITHUB_ENV"

      - name: Validate infra planning configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow-managed resource-group suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve existing hosted resources
        id: resolve_resources
        env:
          AZURE_RECOVER_GLOBAL_RESOURCES: false
        run: ./scripts/azure/resolve-hosted-resource-inputs.sh

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Discover current deploy state
        id: discover
        run: |
          source ./scripts/azure/environment-resource-names.sh
          derive_environment_names
          CONTAINER_APP_NAME="$(
            resolve_existing_resource_name_by_type \
              'Microsoft.App/containerApps' \
              'Container App' \
              "$AZURE_EXPECTED_CONTAINER_APP_NAME" \
              "$AZURE_LEGACY_CONTAINER_APP_NAME"
          )"
          CURRENT_IMAGE_REF="$(
            az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$CONTAINER_APP_NAME" \
              --query 'properties.template.containers[0].image' \
              --output tsv 2>/dev/null || true
          )"
          INFRA_IMAGE_REF="${CURRENT_IMAGE_REF:-$RELEASE_IMAGE_REF}"

          echo "infra_image_ref=$INFRA_IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Plan infrastructure changes
        id: plan
        run: |
          RESOURCE_NAME_SUFFIX="$AZURE_RESOURCE_GROUP_SUFFIX"
          LOG_ANALYTICS_WORKSPACE_NAME='${{ steps.resolve_resources.outputs.log_analytics_workspace_name }}'
          APPLICATION_INSIGHTS_NAME='${{ steps.resolve_resources.outputs.application_insights_name }}'
          VIRTUAL_NETWORK_NAME='${{ steps.resolve_resources.outputs.virtual_network_name }}'
          MANAGED_ENVIRONMENT_NAME='${{ steps.resolve_resources.outputs.managed_environment_name }}'
          CONTAINER_APP_NAME='${{ steps.resolve_resources.outputs.container_app_name }}'
          SQL_RUNTIME_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_runtime_identity_name }}'
          SQL_MIGRATION_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_migration_identity_name }}'
          SQL_BOOTSTRAP_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_bootstrap_identity_name }}'
          FRONT_DOOR_PROFILE_NAME='${{ steps.resolve_resources.outputs.front_door_profile_name }}'
          FRONT_DOOR_ENDPOINT_NAME='${{ steps.resolve_resources.outputs.front_door_endpoint_name }}'
          FRONT_DOOR_ORIGIN_GROUP_NAME='${{ steps.resolve_resources.outputs.front_door_origin_group_name }}'
          APP_CONFIGURATION_NAME='${{ steps.resolve_resources.outputs.app_configuration_name }}'
          KEY_VAULT_NAME='${{ steps.resolve_resources.outputs.key_vault_name }}'
          EXISTING_SQL_SERVER_NAME='${{ steps.resolve_resources.outputs.existing_sql_server_name }}'
          parameters=(
            appName="$AZURE_APP_NAME"
            manageRuntimeRoleAssignments=false
            containerImage="${{ steps.discover.outputs.infra_image_ref }}"
          )

          while IFS= read -r parameter; do
            [[ -n "$parameter" ]] && parameters+=("$parameter")
          done < <(
            RESOURCE_NAME_SUFFIX="$RESOURCE_NAME_SUFFIX" \
            LOG_ANALYTICS_WORKSPACE_NAME="$LOG_ANALYTICS_WORKSPACE_NAME" \
            APPLICATION_INSIGHTS_NAME="$APPLICATION_INSIGHTS_NAME" \
            VIRTUAL_NETWORK_NAME="$VIRTUAL_NETWORK_NAME" \
            MANAGED_ENVIRONMENT_NAME="$MANAGED_ENVIRONMENT_NAME" \
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME" \
            SQL_RUNTIME_IDENTITY_NAME="$SQL_RUNTIME_IDENTITY_NAME" \
            SQL_MIGRATION_IDENTITY_NAME="$SQL_MIGRATION_IDENTITY_NAME" \
            SQL_BOOTSTRAP_IDENTITY_NAME="$SQL_BOOTSTRAP_IDENTITY_NAME" \
            FRONT_DOOR_PROFILE_NAME="$FRONT_DOOR_PROFILE_NAME" \
            FRONT_DOOR_ENDPOINT_NAME="$FRONT_DOOR_ENDPOINT_NAME" \
            FRONT_DOOR_ORIGIN_GROUP_NAME="$FRONT_DOOR_ORIGIN_GROUP_NAME" \
            APP_CONFIGURATION_NAME="$APP_CONFIGURATION_NAME" \
            KEY_VAULT_NAME="$KEY_VAULT_NAME" \
            EXISTING_SQL_SERVER_NAME="$EXISTING_SQL_SERVER_NAME" \
            ./scripts/azure/append-bicep-resource-parameters.sh
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --result-format ResourceIdOnly \
            --no-pretty-print \
            --output json > whatif.json

          python3 - <<'PY'
          import json
          import os

          with open("whatif.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          changes = []
          if isinstance(payload, dict):
              changes = payload.get("changes")
              if changes is None:
                  changes = payload.get("properties", {}).get("changes", [])

          filtered = [
              change for change in changes
              if change.get("changeType") not in {"NoChange", "Ignore"}
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"has_changes={'true' if filtered else 'false'}\n")
          PY

      - name: Summarize infra plan result
        run: |
          if [[ "${{ steps.plan.outputs.has_changes }}" == "true" ]]; then
            echo "Azure what-if detected actionable infrastructure changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Azure what-if detected no actionable infrastructure changes. deploy_infra will be skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy_infra:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest
    needs:
      - publish
      - plan_infra
    if: ${{ !github.event.release.prerelease && needs.plan_infra.outputs.has_changes == 'true' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_GLOBAL_NAME_SUFFIX: ${{ vars.AZURE_GLOBAL_NAME_SUFFIX }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      INFRA_IMAGE_REF: ${{ needs.plan_infra.outputs.infra_image_ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Derive target resource group
        run: echo "AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP_PREFIX}-${AZURE_RESOURCE_GROUP_SUFFIX}" >> "$GITHUB_ENV"

      - name: Validate release deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_PREFIX" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP_SUFFIX" || { echo "Missing workflow-managed resource-group suffix"; exit 1; }
          [[ "$AZURE_RESOURCE_GROUP_PREFIX" != *- ]] || { echo "AZURE_RESOURCE_GROUP must contain only the shared prefix without a suffix"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing derived target resource group"; exit 1; }
          test -n "$AZURE_APP_NAME" || { echo "Missing environment variable AZURE_APP_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve existing hosted resources
        id: resolve_resources
        env:
          AZURE_RECOVER_GLOBAL_RESOURCES: false
        run: ./scripts/azure/resolve-hosted-resource-inputs.sh

      - name: Validate Bicep entrypoint
        run: az bicep build --file ./infra/main.bicep > /dev/null

      - name: Deploy infrastructure baseline
        id: deploy_infra_async
        run: |
          DEPLOYMENT_NAME="release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RESOURCE_NAME_SUFFIX="$AZURE_RESOURCE_GROUP_SUFFIX"
          LOG_ANALYTICS_WORKSPACE_NAME='${{ steps.resolve_resources.outputs.log_analytics_workspace_name }}'
          APPLICATION_INSIGHTS_NAME='${{ steps.resolve_resources.outputs.application_insights_name }}'
          VIRTUAL_NETWORK_NAME='${{ steps.resolve_resources.outputs.virtual_network_name }}'
          MANAGED_ENVIRONMENT_NAME='${{ steps.resolve_resources.outputs.managed_environment_name }}'
          CONTAINER_APP_NAME='${{ steps.resolve_resources.outputs.container_app_name }}'
          SQL_RUNTIME_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_runtime_identity_name }}'
          SQL_MIGRATION_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_migration_identity_name }}'
          SQL_BOOTSTRAP_IDENTITY_NAME='${{ steps.resolve_resources.outputs.sql_bootstrap_identity_name }}'
          FRONT_DOOR_PROFILE_NAME='${{ steps.resolve_resources.outputs.front_door_profile_name }}'
          FRONT_DOOR_ENDPOINT_NAME='${{ steps.resolve_resources.outputs.front_door_endpoint_name }}'
          FRONT_DOOR_ORIGIN_GROUP_NAME='${{ steps.resolve_resources.outputs.front_door_origin_group_name }}'
          APP_CONFIGURATION_NAME='${{ steps.resolve_resources.outputs.app_configuration_name }}'
          KEY_VAULT_NAME='${{ steps.resolve_resources.outputs.key_vault_name }}'
          EXISTING_SQL_SERVER_NAME='${{ steps.resolve_resources.outputs.existing_sql_server_name }}'
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          parameters=(
            appName="$AZURE_APP_NAME"
            manageRuntimeRoleAssignments=false
            containerImage="$INFRA_IMAGE_REF"
          )

          while IFS= read -r parameter; do
            [[ -n "$parameter" ]] && parameters+=("$parameter")
          done < <(
            RESOURCE_NAME_SUFFIX="$RESOURCE_NAME_SUFFIX" \
            LOG_ANALYTICS_WORKSPACE_NAME="$LOG_ANALYTICS_WORKSPACE_NAME" \
            APPLICATION_INSIGHTS_NAME="$APPLICATION_INSIGHTS_NAME" \
            VIRTUAL_NETWORK_NAME="$VIRTUAL_NETWORK_NAME" \
            MANAGED_ENVIRONMENT_NAME="$MANAGED_ENVIRONMENT_NAME" \
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME" \
            SQL_RUNTIME_IDENTITY_NAME="$SQL_RUNTIME_IDENTITY_NAME" \
            SQL_MIGRATION_IDENTITY_NAME="$SQL_MIGRATION_IDENTITY_NAME" \
            SQL_BOOTSTRAP_IDENTITY_NAME="$SQL_BOOTSTRAP_IDENTITY_NAME" \
            FRONT_DOOR_PROFILE_NAME="$FRONT_DOOR_PROFILE_NAME" \
            FRONT_DOOR_ENDPOINT_NAME="$FRONT_DOOR_ENDPOINT_NAME" \
            FRONT_DOOR_ORIGIN_GROUP_NAME="$FRONT_DOOR_ORIGIN_GROUP_NAME" \
            APP_CONFIGURATION_NAME="$APP_CONFIGURATION_NAME" \
            KEY_VAULT_NAME="$KEY_VAULT_NAME" \
            EXISTING_SQL_SERVER_NAME="$EXISTING_SQL_SERVER_NAME" \
            ./scripts/azure/append-bicep-resource-parameters.sh
          )

          if [[ -n "${AZURE_GLOBAL_NAME_SUFFIX:-}" ]]; then
            parameters+=(globalNameSuffix="$AZURE_GLOBAL_NAME_SUFFIX")
          fi

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file ./infra/main.bicep \
            --parameters "${parameters[@]}" \
            --no-wait \
            --output none

      - name: Approve Azure Front Door private link connections
        env:
          DEPLOYMENT_NAME: ${{ steps.deploy_infra_async.outputs.deployment_name }}
          FRONT_DOOR_PRIVATE_LINK_MAX_WAIT_SECONDS: "3600"
          FRONT_DOOR_PRIVATE_LINK_DELAY_SECONDS: "10"
        run: ./scripts/azure/await-frontdoor-private-link.sh

      - name: Wait for infrastructure deployment completion
        run: |
          DEPLOYMENT_NAME="${{ steps.deploy_infra_async.outputs.deployment_name }}"
          test -n "$DEPLOYMENT_NAME" || { echo "Missing release deployment name."; exit 1; }

          az deployment group wait \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --custom "properties.provisioningState=='Succeeded' || properties.provisioningState=='Failed' || properties.provisioningState=='Canceled'" \
            --interval 15 \
            --timeout 3600

          DEPLOYMENT_STATE="$(
            az deployment group show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query properties.provisioningState \
              --output tsv
          )"

          if [[ "$DEPLOYMENT_STATE" != "Succeeded" ]]; then
            az deployment operation group list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$DEPLOYMENT_NAME" \
              --query "[?properties.provisioningState!='Succeeded'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,state:properties.provisioningState,status:properties.statusMessage}" \
              --output json
            echo "Release infrastructure deployment finished with state: $DEPLOYMENT_STATE"
            exit 1
          fi

  rollout_release:
    name: Run Shared Azure Rollout
    needs:
      - publish
      - classify_release_scope
      - plan_infra
      - deploy_infra
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !github.event.release.prerelease &&
        needs.publish.result == 'success' &&
        needs.classify_release_scope.result == 'success' &&
        needs.classify_release_scope.outputs.requires_rollout == 'true' &&
        (needs.plan_infra.result == 'success' || needs.plan_infra.result == 'skipped') &&
        (needs.deploy_infra.result == 'success' || needs.deploy_infra.result == 'skipped')
      }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/shared-azure-rollout.yml
    with:
      image_ref: ${{ needs.publish.outputs.image_ref }}
      resource_group_suffix: green
      bootstrap_environment: production
      deployment_environment: production
      run_runtime_config_sync: ${{ needs.classify_release_scope.outputs.requires_runtime_config_sync == 'true' || needs.deploy_infra.result == 'success' }}
      run_sql_bootstrap: ${{ needs.classify_release_scope.outputs.requires_database_jobs == 'true' || needs.deploy_infra.result == 'success' }}
      run_database_migration: ${{ needs.classify_release_scope.outputs.requires_database_jobs == 'true' || needs.deploy_infra.result == 'success' }}
