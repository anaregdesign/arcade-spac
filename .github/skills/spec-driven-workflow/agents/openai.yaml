interface:
  display_name: "Spec Driven Workflow"
  short_description: "Own /doc/spec and /doc/plan.md planning workflow"
  default_prompt: "Use $spec-driven-workflow when the work needs /doc/spec documentation plus a temporary /doc/plan.md with Long-Term, Mid-Term, and Short-Term checkboxes as needed. Keep the plan current during implementation, record progress in deliberate Conventional Commits work units when the repository uses them, and delete the plan once all tracked work is done. Do not use it to decide app-code architecture or cloud platform topology."
