interface:
  display_name: "Spec Driven Workflow"
  short_description: "Keep app work on a canonical doc set"
  default_prompt: "Use $spec-driven-workflow to keep non-trivial app work on a small canonical doc set: keep `/docs/spec/specification.md` for final functional requirements and goal image only, keep all transient work notes in `/docs/plans/plan.md`, update `/docs/operations.md` or `/docs/design.md` only for accepted long-lived rules, and archive the completed plan."
